pre-commit:
  parallel: false
  commands:
    fmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true # re-stage files reformatted by go fmt
    lint:
      glob: "*.go"
      run: golangci-lint run ./...
    govet:
      glob: "*.go"
      run: go vet ./...
    test-short:
      run: go test -short ./...

commit-msg:
  commands:
    lint:
      run: |
        msg=$(cat {1})
        if [ ${#msg} -lt 10 ]; then
          echo "Commit message too short!"
          exit 1
        fi

post-merge:
  commands:
    tidy:
      run: go mod tidy
